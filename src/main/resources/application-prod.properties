server.port=${SERVER_PORT:3000}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=never

sepay.webhook.secret=${SEPAY_WEBHOOK_SECRET}
sepay.webhook.allowed-clock-skew-seconds=${SEPAY_WEBHOOK_ALLOWED_CLOCK_SKEW_SECONDS:300}
sepay.webhook.pending-booking-status=${SEPAY_PENDING_BOOKING_STATUS:0}
sepay.webhook.paid-booking-status=${SEPAY_PAID_BOOKING_STATUS:1}